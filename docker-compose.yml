version: "3.8"

services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: ./api-node
    ports:
      - "3000:3000"
    depends_on:
      - db
      - rabbitmq

  go-worker:
    build: ./service-go
    depends_on:
      - rabbitmq